<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Ortho Support Mattress">
  <defs>
    <linearGradient id="bg3" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#FAF7F2"/>
      <stop offset="1" stop-color="#E8E0D1"/>
    </linearGradient>
    <linearGradient id="mat3" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#F5EEDF"/>
      <stop offset="1" stop-color="#D6C8AD"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg3)"/>
  <ellipse cx="400" cy="520" rx="300" ry="28" fill="#22303C" opacity="0.13"/>
  <!-- Mattress -->
  <rect x="130" y="270" width="540" height="180" rx="20" fill="url(#mat3)"/>
  <rect x="130" y="260" width="540" height="40" rx="18" fill="#FFFFFF"/>
  <!-- Orthopedic support grid (coils) -->
  <g stroke="#8B7456" stroke-width="1.4" opacity="0.55" fill="none">
    <g transform="translate(170 340)">
      <circle r="16"/><circle r="10"/><circle r="5"/>
    </g>
    <g transform="translate(230 340)"><circle r="16"/><circle r="10"/><circle r="5"/></g>
    <g transform="translate(290 340)"><circle r="16"/><circle r="10"/><circle r="5"/></g>
    <g transform="translate(350 340)"><circle r="16"/><circle r="10"/><circle r="5"/></g>
    <g transform="translate(410 340)"><circle r="16"/><circle r="10"/><circle r="5"/></g>
    <g transform="translate(470 340)"><circle r="16"/><circle r="10"/><circle r="5"/></g>
    <g transform="translate(530 340)"><circle r="16"/><circle r="10"/><circle r="5"/></g>
    <g transform="translate(590 340)"><circle r="16"/><circle r="10"/><circle r="5"/></g>
    <g transform="translate(200 400)"><circle r="16"/><circle r="10"/><circle r="5"/></g>
    <g transform="translate(260 400)"><circle r="16"/><circle r="10"/><circle r="5"/></g>
    <g transform="translate(320 400)"><circle r="16"/><circle r="10"/><circle r="5"/></g>
    <g transform="translate(380 400)"><circle r="16"/><circle r="10"/><circle r="5"/></g>
    <g transform="translate(440 400)"><circle r="16"/><circle r="10"/><circle r="5"/></g>
    <g transform="translate(500 400)"><circle r="16"/><circle r="10"/><circle r="5"/></g>
    <g transform="translate(560 400)"><circle r="16"/><circle r="10"/><circle r="5"/></g>
  </g>
  <!-- Stitch trim -->
  <path d="M140 290 L660 290" stroke="#A5896A" stroke-width="2" stroke-dasharray="6 6"/>
  <path d="M140 440 L660 440" stroke="#A5896A" stroke-width="2" stroke-dasharray="6 6"/>
  <!-- Pillow -->
  <rect x="250" y="200" width="300" height="70" rx="20" fill="#FFFFFF" stroke="#E4D9C6" stroke-width="2"/>
  <!-- Tag -->
  <rect x="540" y="365" width="90" height="22" rx="4" fill="#8B7456"/>
  <text x="585" y="380" text-anchor="middle" font-family="Inter" font-size="10" fill="#FAF7F2" letter-spacing="2">ORTHO</text>
</svg>
