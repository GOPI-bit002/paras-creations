<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Dual Comfort Pillow">
  <defs>
    <linearGradient id="bg5" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#F5F1EA"/>
      <stop offset="1" stop-color="#E4D9C6"/>
    </linearGradient>
    <radialGradient id="p5" cx="50%" cy="40%" r="60%">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E8DEC9"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg5)"/>
  <ellipse cx="400" cy="500" rx="300" ry="24" fill="#22303C" opacity="0.12"/>
  <!-- Big pillow back -->
  <path d="M140 220 Q200 170 400 170 Q600 170 660 220 Q700 300 660 380 Q600 430 400 430 Q200 430 140 380 Q100 300 140 220 Z" fill="url(#p5)" stroke="#D9CDB5" stroke-width="2"/>
  <!-- Small pillow front -->
  <path d="M220 350 Q260 310 400 310 Q540 310 580 350 Q610 400 580 440 Q540 470 400 470 Q260 470 220 440 Q190 400 220 350 Z" fill="#FAF7F2" stroke="#CFDDE8" stroke-width="2"/>
  <!-- Stitching on front pillow -->
  <path d="M240 400 Q400 420 560 400" stroke="#CFDDE8" stroke-width="1.6" fill="none" stroke-dasharray="5 5"/>
  <!-- Tag -->
  <rect x="540" y="250" width="90" height="22" rx="4" fill="#6E8AA6"/>
  <text x="585" y="265" text-anchor="middle" font-family="Inter" font-size="10" fill="#FAF7F2" letter-spacing="2">PILLOW</text>
</svg>
