<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Premium Foam Mattress">
  <defs>
    <linearGradient id="bg2" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#EAF0F5"/>
      <stop offset="1" stop-color="#CFDDE8"/>
    </linearGradient>
    <linearGradient id="mat2" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#DDE7EF"/>
    </linearGradient>
    <linearGradient id="foam2" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#DDE7EF"/>
      <stop offset="1" stop-color="#8FA9C0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg2)"/>
  <ellipse cx="400" cy="530" rx="290" ry="26" fill="#22303C" opacity="0.14"/>
  <!-- Layered foam stack -->
  <rect x="150" y="420" width="500" height="60" rx="14" fill="#6E8AA6"/>
  <rect x="150" y="360" width="500" height="70" rx="14" fill="url(#foam2)"/>
  <rect x="150" y="300" width="500" height="70" rx="14" fill="url(#mat2)"/>
  <rect x="150" y="260" width="500" height="50" rx="14" fill="#FFFFFF"/>
  <!-- Stitch lines -->
  <path d="M160 300 L640 300" stroke="#8FA9C0" stroke-width="1.6" stroke-dasharray="5 5"/>
  <path d="M160 360 L640 360" stroke="#8FA9C0" stroke-width="1.6" stroke-dasharray="5 5"/>
  <path d="M160 420 L640 420" stroke="#8FA9C0" stroke-width="1.6" stroke-dasharray="5 5"/>
  <!-- Foam dots -->
  <g fill="#B6C6D6" opacity="0.6">
    <circle cx="200" cy="390" r="3"/>
    <circle cx="240" cy="395" r="2"/>
    <circle cx="285" cy="388" r="3"/>
    <circle cx="340" cy="400" r="2"/>
    <circle cx="400" cy="390" r="3"/>
    <circle cx="460" cy="395" r="2"/>
    <circle cx="520" cy="388" r="3"/>
    <circle cx="580" cy="400" r="2"/>
    <circle cx="620" cy="390" r="3"/>
  </g>
  <!-- Pillow -->
  <rect x="280" y="210" width="240" height="66" rx="18" fill="#FFFFFF" stroke="#CFDDE8" stroke-width="2"/>
  <!-- Cooling symbol tag -->
  <rect x="540" y="330" width="90" height="22" rx="4" fill="#6E8AA6"/>
  <text x="585" y="345" text-anchor="middle" font-family="Inter" font-size="10" fill="#FAF7F2" letter-spacing="2">COOL FOAM</text>
</svg>
