<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="King Size Mattress">
  <defs>
    <linearGradient id="bg6" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#E9F0F6"/>
      <stop offset="1" stop-color="#CFDDE8"/>
    </linearGradient>
    <linearGradient id="mat6" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E2EAF2"/>
    </linearGradient>
    <linearGradient id="side6" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#C9D7E3"/>
      <stop offset="1" stop-color="#8FA9C0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg6)"/>
  <ellipse cx="400" cy="530" rx="320" ry="26" fill="#22303C" opacity="0.14"/>
  <!-- Frame -->
  <rect x="90" y="440" width="620" height="70" rx="8" fill="#4B5A6A"/>
  <rect x="90" y="440" width="620" height="12" fill="#6E8AA6"/>
  <!-- Mattress -->
  <rect x="110" y="280" width="580" height="170" rx="20" fill="url(#side6)"/>
  <rect x="110" y="270" width="580" height="44" rx="18" fill="url(#mat6)"/>
  <!-- Quilt diamond pattern -->
  <g stroke="#B6C6D6" stroke-width="1" opacity="0.7" fill="none">
    <path d="M120 300 L200 380 M200 300 L120 380 M200 300 L280 380 M280 300 L200 380 M280 300 L360 380 M360 300 L280 380 M360 300 L440 380 M440 300 L360 380 M440 300 L520 380 M520 300 L440 380 M520 300 L600 380 M600 300 L520 380 M600 300 L680 380 M680 300 L600 380"/>
  </g>
  <!-- Stitch -->
  <path d="M120 440 L680 440" stroke="#8FA9C0" stroke-width="1.6" stroke-dasharray="5 5"/>
  <!-- Three pillows -->
  <rect x="150" y="230" width="150" height="60" rx="16" fill="#FFFFFF" stroke="#CFDDE8" stroke-width="2"/>
  <rect x="325" y="220" width="150" height="60" rx="16" fill="#FAF7F2" stroke="#CFDDE8" stroke-width="2"/>
  <rect x="500" y="230" width="150" height="60" rx="16" fill="#FFFFFF" stroke="#CFDDE8" stroke-width="2"/>
  <!-- Tag -->
  <rect x="560" y="375" width="90" height="22" rx="4" fill="#22303C" opacity="0.88"/>
  <text x="605" y="390" text-anchor="middle" font-family="Inter" font-size="10" fill="#FAF7F2" letter-spacing="2">KING</text>
</svg>
