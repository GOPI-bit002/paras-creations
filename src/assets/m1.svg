<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Comfort Rest Mattress">
  <defs>
    <linearGradient id="bg1" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#F6EFE2"/>
      <stop offset="1" stop-color="#E4D9C6"/>
    </linearGradient>
    <linearGradient id="mat1" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EFE7DA"/>
    </linearGradient>
    <linearGradient id="side1" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#EFE7DA"/>
      <stop offset="1" stop-color="#CBB995"/>
    </linearGradient>
    <pattern id="quilt1" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <path d="M0 20 L40 20 M20 0 L20 40" stroke="#D9CDB5" stroke-width="1" opacity="0.55"/>
      <circle cx="20" cy="20" r="1.6" fill="#C9B793"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#bg1)"/>
  <ellipse cx="400" cy="520" rx="300" ry="28" fill="#22303C" opacity="0.12"/>
  <!-- Bed frame -->
  <rect x="120" y="430" width="560" height="70" rx="10" fill="#8B7456"/>
  <rect x="120" y="430" width="560" height="14" fill="#A5896A"/>
  <!-- Mattress body -->
  <rect x="140" y="280" width="520" height="160" rx="22" fill="url(#side1)"/>
  <rect x="140" y="270" width="520" height="40" rx="20" fill="url(#mat1)"/>
  <rect x="140" y="275" width="520" height="160" rx="22" fill="url(#quilt1)" opacity="0.45"/>
  <!-- Stitch lines -->
  <path d="M150 310 L650 310" stroke="#C9B793" stroke-width="2" stroke-dasharray="6 6"/>
  <path d="M150 420 L650 420" stroke="#C9B793" stroke-width="2" stroke-dasharray="6 6"/>
  <!-- Pillows -->
  <rect x="190" y="230" width="180" height="70" rx="18" fill="#FFFFFF" stroke="#E4D9C6" stroke-width="2"/>
  <rect x="430" y="230" width="180" height="70" rx="18" fill="#FAF7F2" stroke="#E4D9C6" stroke-width="2"/>
  <!-- Label tag -->
  <rect x="560" y="380" width="80" height="24" rx="4" fill="#22303C" opacity="0.85"/>
  <text x="600" y="396" text-anchor="middle" font-family="Inter" font-size="11" fill="#FAF7F2" letter-spacing="2">COMFORT</text>
</svg>
