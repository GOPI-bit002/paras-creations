<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Luxury Memory Foam Mattress">
  <defs>
    <linearGradient id="bg4" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#F1ECE3"/>
      <stop offset="1" stop-color="#D8CDBB"/>
    </linearGradient>
    <linearGradient id="mat4" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EAE0CF"/>
    </linearGradient>
    <pattern id="diam4" width="36" height="36" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="36" height="36" fill="none"/>
      <path d="M0 18 L18 0 L36 18 L18 36 Z" stroke="#C9B793" stroke-width="0.8" fill="none" opacity="0.7"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#bg4)"/>
  <ellipse cx="400" cy="525" rx="310" ry="26" fill="#22303C" opacity="0.12"/>
  <!-- Headboard -->
  <rect x="110" y="140" width="580" height="120" rx="18" fill="#9A8566"/>
  <rect x="130" y="160" width="540" height="90" rx="12" fill="#B69B78"/>
  <!-- Mattress -->
  <rect x="130" y="280" width="540" height="170" rx="22" fill="url(#mat4)"/>
  <rect x="130" y="280" width="540" height="170" rx="22" fill="url(#diam4)" opacity="0.7"/>
  <!-- Trim -->
  <path d="M140 300 L660 300" stroke="#C9B793" stroke-width="1.6" stroke-dasharray="5 5"/>
  <path d="M140 440 L660 440" stroke="#C9B793" stroke-width="1.6" stroke-dasharray="5 5"/>
  <!-- Pillows -->
  <rect x="180" y="250" width="180" height="60" rx="18" fill="#FFFFFF" stroke="#E4D9C6" stroke-width="2"/>
  <rect x="440" y="250" width="180" height="60" rx="18" fill="#FAF7F2" stroke="#E4D9C6" stroke-width="2"/>
  <!-- Blanket fold -->
  <path d="M130 430 L670 430 L660 470 L140 470 Z" fill="#6E8AA6" opacity="0.85"/>
  <path d="M140 440 L660 440" stroke="#FAF7F2" stroke-width="1" opacity="0.5"/>
  <!-- Tag -->
  <rect x="540" y="370" width="90" height="22" rx="4" fill="#22303C" opacity="0.88"/>
  <text x="585" y="385" text-anchor="middle" font-family="Inter" font-size="10" fill="#FAF7F2" letter-spacing="2">LUXURY</text>
</svg>
